services:
  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://satisfacao:${POSTGRES_PASSWORD}@db:5432/satisfacao
      SESSION_SECRET: ${SESSION_SECRET}
      IDENTITY_ENCRYPTION_KEY: ${IDENTITY_ENCRYPTION_KEY}
      AUTH_DEMO_MODE: "false"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: satisfacao
      POSTGRES_USER: satisfacao
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U satisfacao -d satisfacao"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
